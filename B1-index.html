<!DOCTYPE html>
<html lang="en">
<head>
  <title>interactive quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex justify-center items-center p-4">

<main
  class="bg-white w-full max-w-2xl rounded-xl shadow-lg p-6"
>

  <header class="mb-6">
    <h1
      id="quiz-title"
      class="text-3xl font-bold text-center"
    >
      JavaScript Quiz
    </h1>
  </header>

  <section
    aria-labelledby="quiz-title"
  >

    <div class="mb-4">

      <div class="flex justify-between mb-1">

        <span>Progress</span>

        <output id="progressText">
          1 / 10
        </output>

      </div>

      <div
        class="w-full bg-gray-200 rounded-full h-4"
      >

        <div
          id="progressBar"
          class="bg-blue-500 h-4 rounded-full"
          style="width:10%"
        ></div>

      </div>

    </div>

    <div
      class="flex justify-between mb-6"
    >

      <p>
        Score:
        <output id="score">0</output>
      </p>

      <p>
        Best:
        <output id="bestScore">0</output>
      </p>

      <p>
        Time:
        <output id="timer">15</output>s
      </p>

    </div>

    <article>

      <h2
        id="question"
        class="text-xl font-semibold mb-4"
      ></h2>

      <div
        id="answers"
        class="space-y-3"
      ></div>

    </article>

    <button
      id="nextBtn"
      class="mt-6 bg-blue-500 text-white px-4 py-2 rounded hidden"
    >
      Next Question
    </button>

  </section>

</main>

</body>
  
  <script src="B1-script.js"></script>
</body>
</html>
